<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title> Projet AIS - Visualiser des bateaux</title>

    <!-- Plotly.js pour afficher la carte -->
    <script src="https://cdn.plot.ly/plotly-2.20.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- CSS Styles -->
    <link href="css/style.css" type="text/css" rel="stylesheet">
    

     
    <!-- JS -->
    <script src="js/utils.js" defer></script>
    <script src="js/visualisation.js" defer></script>
    
</head>

<body id="visu_page">
    <header> <!-- en-tête commun aux pages-->
        <h1> Projet AIS - Analyse des comportements des navires</h1>
        <nav> <!-- menu -->
            <a href="index.html">Accueil</a>
            <a href="ajouter.html">Ajouter</a>
            <a href="visualisation.html">Visualiser</a>
        </nav>
    </header>

    <main>
        <section id="section-tableau">
            <h2>Tableau des bateaux</h2>
            <table id="tableBateaux">
                <thead>
                    <tr>
                        <td>Sélection</td>
                        <th>MMSI</th>
                        <th>Date/Heure</th>
                        <th>Latitude</th>
                        <th>Longitude</th>
                        <th>SOG</th>
                        <th>COG</th>
                        <th>Cap réel</th>
                        <th>Nom</th>
                        <th>État</th>
                        <th>Longueur</th>
                        <th>Largeur</th>
                        <th>Tirant d'eau</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Les lignes seront ajoutées dynamiquement par visualiser.js -->
                </tbody>
            </table>
        </section>

        <section id="section-carte">
            <h2>Carte des positions</h2>
            <div id="map" style="width: 100%; height: 600px;"></div>
        </section>
    <input type="hidden" id="mmsi" name="mmsi">
    <div id="boutons-actions">
        <section>
            <button id="b_predire">Prédire les clusters</button>
        </section>

       <section>
            <button id="t_predire">Prédire le type</button>
        </section>
   
        <section>
            <button id="b_predire_traj">Prédire la trajectoire</button>
        </section>
 
    </main>


    <footer>
    <div class="footer-left">
        <p>© Groupe 5 - ISEN A3 2025</p>
    </div>
    <div class="footer-right">

        <a href="mailto:asma.rassil@isen-ouest.yncrea.fr">Asma RASSIL</a>
        <a href="mailto:marie.epinat@isen-ouest.yncrea.fr">Marie EPINAT</a>
    </div>
    </footer>

</body>
</html>
