    <section>
        

        <h2 class="titre-centre">Ajouter un navire</h2>

<form id="form_bateau">

    <h3>Caractéristiques du bateau</h3>

    <div class="form-row">
        <label for="mmsi">MMSI :</label>
        <input type="text" name="mmsi" id="mmsi" required>
    </div>

    <div class="form-row">
        <label for="nom">Nom du bateau :</label>
        <input type="text" name="nom_bateau" id="nom" required>
    </div>

    <div class="form-row">
        <label for="longueur">Longueur :</label>
        <input type="number" name="longueur" id="longueur" min="0" required>
    </div>

    <div class="form-row">
        <label for="largeur">Largeur :</label>
        <input type="number" name="largeur" id="largeur" min="0" required>
    </div>

    <div class="form-row">
        <label for="tirant_eau">Tirant d'eau :</label>
        <input type="number" name="tirant_eau" id="tirant_eau" min="0" step="any" required>
    </div>

    <h3>Données à rentrer</h3>

    <div class="form-row">
        <label for="horodatage">Horodatage :</label>
        <input type="datetime-local" name="horodatage" id="horodatage" required>
    </div>

    <div class="form-row">
        <label for="latitude">Latitude :</label>
        <input type="number" name="latitude" id="latitude" step="any" min="-90" max="90" required>
    </div>

    
    <div class="form-row">
        <label for="longitude">Longitude :</label>
        <input type="number" name="longitude" id="longitude" step="any" min="-180" max="180" required>
    </div>

    <div class="form-row">
        <label for="sog">SOG :</label>
        <input type="number" name="sog" id="sog" step="any" min="0" required>
    </div>

    <div class="form-row">
        <label for="cog">COG :</label>
        <input type="number" name="cog" id="cog" step="any" min="0" required>
    </div>

    <div class="form-row">
        <label for="heading">Heading :</label>
        <input type="number" name="heading" id="heading" step="any" min="0" required>
    </div>

    <h3>État du bateau</h3>
    <div class="form-row">
        <label for="etat">État :</label>
        <select name="id_etat" id="etatSelect" required>
            <option value="" disabled selected>Choisir...</option>
        </select>
    </div>
    <button type="submit" id="btn-ajouter-bateau">Ajouter le bateau</button>


</form>
